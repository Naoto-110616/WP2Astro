name: CI

on:
  push:
    branches: [main, "saas/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (migrator-core, migrator)
        run: pnpm -r --filter '!@wp2astro/starter' build

      - name: Type check & build (starter)
        env:
          PUBLIC_SANITY_PROJECT_ID: dummy
          PUBLIC_SANITY_DATASET: production
          PUBLIC_SITE_URL: https://example.com
        run: pnpm --filter @wp2astro/starter build
